server {
    listen 80 default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — everything not on disk routes back to index.html so
    # client-side routes (eventually) work after a hard refresh.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hashed Vite assets — long-lived cache.
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # index.html itself — never cache so deploys are visible immediately.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
