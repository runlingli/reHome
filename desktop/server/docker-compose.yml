# Deployed to /root/rehome/docker-compose.yml on 178.104.248.143.
# Pattern mirrors /root/portforlio/docker-compose.yml — same Traefik network,
# same http→https redirect middleware, same Let's Encrypt resolver.
networks:
  traefik-public:
    external: true

services:
  rehome:
    image: nginx:alpine
    container_name: rehome
    restart: unless-stopped
    volumes:
      - ./dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - traefik-public
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public

      # http → https redirect
      - traefik.http.middlewares.rehome-https.redirectscheme.scheme=https
      - traefik.http.middlewares.rehome-https.redirectscheme.permanent=true
      - traefik.http.routers.rehome-http.entrypoints=web
      - traefik.http.routers.rehome-http.rule=Host(`rehome.design`) || Host(`www.rehome.design`)
      - traefik.http.routers.rehome-http.middlewares=rehome-https@docker

      # https with Let's Encrypt
      - traefik.http.routers.rehome.entrypoints=websecure
      - traefik.http.routers.rehome.rule=Host(`rehome.design`) || Host(`www.rehome.design`)
      - traefik.http.routers.rehome.tls.certresolver=le
      - traefik.http.services.rehome.loadbalancer.server.port=80
